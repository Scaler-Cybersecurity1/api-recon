<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scaler Lab · Cybersecurity · API Reconnaissance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --nav-bg: #0b0f1a;
  --nav-border: #1a2234;
  --nav-fg: #e8edf5;
  --nav-muted: #8592a6;
  --nav-accent: #22c55e;
  --nav-height: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; }
body {
  font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
  background: #080b14; color: #e6edf3;
  font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }
input, select, textarea { font-family: inherit; }
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
  outline: 2px solid #22c55e; outline-offset: 2px;
}

/* ============================================================= */
/* GLOBAL TOP NAV                                                 */
/* ============================================================= */
.gnav {
  position: sticky; top: 0; z-index: 100;
  height: var(--nav-height);
  background: var(--nav-bg);
  border-bottom: 1px solid var(--nav-border);
  padding: 0 28px;
  display: flex; align-items: center; gap: 20px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset;
  font-family: 'Inter', sans-serif;
}
.gnav-brand {
  display: flex; align-items: center; gap: 14px;
  color: var(--nav-fg); font-size: 15px; letter-spacing: -0.1px;
}
.gnav-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #22c55e 0%, #0f7c3a 100%);
  display: flex; align-items: center; justify-content: center;
  color: #05110b; font-weight: 800; font-size: 15px; letter-spacing: -0.5px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 6px 14px rgba(34,197,94,0.25);
}
.gnav-name { font-weight: 700; color: #ffffff; letter-spacing: -0.2px; }
.gnav-sep {
  width: 1px; height: 18px; background: #2a3246; display: inline-block;
}
.gnav-product { color: #b8c3d6; font-weight: 400; letter-spacing: 0.1px; }

.gnav-crumb {
  display: flex; align-items: center; gap: 10px;
  color: var(--nav-muted); font-size: 13px;
}
.gnav-crumb .slash { color: #3d4661; }
.gnav-crumb .here { color: #d8dfec; font-weight: 500; }
.gnav-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; color: #c5cee0; font-size: 13px;
  border-radius: 6px; border: 1px solid #1f2a3f; background: #0e1424;
  transition: border-color .15s, background .15s, color .15s;
}
.gnav-back:hover { border-color: #2f3a53; color: #ffffff; background: #131b2e; }
.gnav-back svg { width: 12px; height: 12px; }

.gnav-right {
  margin-left: auto; display: flex; align-items: center; gap: 14px;
}
.gnav-status {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 999px;
  background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.28);
  color: #86efac; font-size: 12px; font-weight: 500; letter-spacing: 0.1px;
}
.gnav-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--nav-accent);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
  animation: pulseDot 2s infinite ease-in-out;
}
@keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
.gnav-user {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #2a3755, #141a2a); color: #b8c3d6;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
  border: 1px solid #222c45;
}

@media (max-width: 680px) {
  .gnav { padding: 0 16px; gap: 12px; }
  .gnav-crumb { display: none; }
  .gnav-status span.label { display: none; }
  .gnav-status { padding: 6px 9px; }
}

/* ============================================================= */
/* HOME                                                           */
/* ============================================================= */
.home {
  min-height: calc(100vh - var(--nav-height));
  background:
    radial-gradient(900px 520px at 18% 0%, rgba(34,197,94,0.09) 0%, transparent 55%),
    radial-gradient(760px 420px at 92% 100%, rgba(245,158,11,0.06) 0%, transparent 60%),
    #070a12;
  padding: 96px 32px 64px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.home::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 35%, #000 40%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 35%, #000 40%, transparent 100%);
  pointer-events: none;
}
.home-inner { max-width: 1060px; width: 100%; margin: 0 auto; position: relative; }

.home-hero {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; margin-bottom: 64px;
}
.home-tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(34,197,94,0.06);
  border: 1px solid rgba(34,197,94,0.22);
  color: #86efac; font-size: 12px; font-weight: 500;
  letter-spacing: 0.3px;
}
.home-tag .pip {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
}
.home h1 {
  font-size: 64px; font-weight: 700; margin-top: 22px;
  letter-spacing: -2.2px; color: #ffffff; line-height: 1;
}
.home h1 .grad {
  background: linear-gradient(90deg, #22c55e 0%, #4ade80 50%, #86efac 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; font-style: italic; font-weight: 700;
}
.home .lede {
  color: #8c9ab3; margin-top: 18px; font-size: 16px;
  max-width: 460px; line-height: 1.55;
}

.home .grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 20px; margin-top: 8px;
}
.lab-card {
  background: linear-gradient(180deg, rgba(16,22,40,0.8) 0%, rgba(9,13,24,0.8) 100%);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 18px;
  padding: 32px;
  transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  backdrop-filter: blur(6px);
  cursor: pointer;
  min-height: 260px;
}
.lab-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(520px circle at 0% 0%, rgba(34,197,94,0.08), transparent 55%);
  opacity: 0; transition: opacity .35s ease;
  pointer-events: none;
}
.lab-card.c4::before { background: radial-gradient(520px circle at 100% 0%, rgba(245,158,11,0.08), transparent 55%); }
.lab-card:hover::before { opacity: 1; }
.lab-card:hover {
  transform: translateY(-4px); border-color: rgba(34,197,94,0.35);
  box-shadow: 0 20px 50px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(34,197,94,0.08);
}
.lab-card.c4:hover {
  border-color: rgba(245,158,11,0.35);
  box-shadow: 0 20px 50px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(245,158,11,0.08);
}

.lab-card-top {
  display: flex; align-items: center; justify-content: space-between;
}
.lab-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.2);
  color: #4ade80;
}
.lab-icon svg { width: 20px; height: 20px; }
.lab-card.c4 .lab-icon {
  background: rgba(245,158,11,0.08);
  border-color: rgba(245,158,11,0.2);
  color: #fbbf24;
}
.lab-arrow {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #5c6b85;
  transition: transform .25s ease, color .25s ease, background .25s ease;
}
.lab-arrow svg { width: 16px; height: 16px; }
.lab-card:hover .lab-arrow { color: #4ade80; background: rgba(34,197,94,0.1); transform: translate(3px, -3px); }
.lab-card.c4:hover .lab-arrow { color: #fbbf24; background: rgba(245,158,11,0.1); }

.lab-card h2 {
  font-size: 20px; margin-top: 40px; font-weight: 600;
  letter-spacing: -0.4px; color: #ffffff;
  line-height: 1.25;
}
.lab-card p {
  color: #7e8ca5; margin-top: 10px; font-size: 13.5px; line-height: 1.55;
}
.lab-card .foot {
  margin-top: auto; padding-top: 24px;
  display: flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; color: #55627c; letter-spacing: 0.2px;
}
.lab-card .foot .dot { width: 3px; height: 3px; border-radius: 50%; background: #2e374d; }

@media (max-width: 768px) {
  .home { padding: 56px 20px 40px; }
  .home-hero { margin-bottom: 40px; }
  .home h1 { font-size: 40px; letter-spacing: -1.3px; }
  .home .lede { font-size: 14px; }
  .home .grid { grid-template-columns: 1fr; gap: 16px; }
  .lab-card { padding: 24px; min-height: 0; }
  .lab-card h2 { margin-top: 28px; font-size: 18px; }
}

/* ============================================================= */
/* LAB 3 — ClearPay Developer Portal (modern 3-col dev portal)    */
/* ============================================================= */
.dp-root {
  font-family: 'Inter', system-ui, sans-serif;
  background: #07091a; color: #e4ecf5;
  min-height: calc(100vh - var(--nav-height));
}
.dp-subnav {
  height: 56px;
  background: rgba(7,9,26,0.85);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid #141b2d;
  padding: 0 28px; display: flex; align-items: center; gap: 20px;
  position: sticky; top: var(--nav-height); z-index: 18;
}
.dp-brand {
  display: flex; align-items: center; gap: 10px;
  color: #e4ecf5; font-size: 14px; font-weight: 600; letter-spacing: -0.1px;
}
.dp-brand-mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: linear-gradient(135deg, #10b981 0%, #047857 100%);
  color: #05110b; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; letter-spacing: -0.3px;
}
.dp-brand .slash { color: #2a3446; margin: 0 4px; font-weight: 400; }
.dp-brand .section { color: #93a3ba; font-weight: 500; }
.dp-version {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.22);
  color: #6ee7b7; font-size: 11px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.2px;
}
.dp-search {
  flex: 1; max-width: 380px; margin-left: auto;
  position: relative;
}
.dp-search input {
  width: 100%; height: 34px; padding: 0 54px 0 36px;
  background: #0d1322; border: 1px solid #1a2238;
  border-radius: 8px; color: #e4ecf5; font-size: 13px;
  transition: border-color .15s, background .15s;
}
.dp-search input::placeholder { color: #4a5670; }
.dp-search input:hover { border-color: #2a3446; }
.dp-search input:focus { outline: none; border-color: #10b981; background: #07091a; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
.dp-search .icn { position: absolute; left: 12px; top: 10px; width: 14px; height: 14px; color: #5a6b82; pointer-events: none; }
.dp-search .kbd {
  position: absolute; right: 6px; top: 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #5a6b82;
  padding: 4px 7px; background: #0a0e1a; border: 1px solid #1a2238;
  border-radius: 4px; line-height: 1;
}

.dp-layout {
  display: grid; grid-template-columns: 260px minmax(0, 1fr);
  max-width: 1540px; margin: 0 auto;
}
.dp-sidebar {
  position: sticky;
  top: calc(var(--nav-height) + 56px);
  height: calc(100vh - var(--nav-height) - 56px);
  overflow-y: auto;
  padding: 28px 14px 40px;
  border-right: 1px solid #141b2d;
  scrollbar-width: thin; scrollbar-color: #1e2639 transparent;
}
.dp-sidebar::-webkit-scrollbar { width: 6px; }
.dp-sidebar::-webkit-scrollbar-thumb { background: #1e2639; border-radius: 3px; }
.dp-sidebar::-webkit-scrollbar-track { background: transparent; }

.dp-side-section { margin-bottom: 24px; }
.dp-side-label {
  font-size: 10.5px; color: #6b7a95;
  text-transform: uppercase; letter-spacing: 1.3px;
  font-weight: 700; padding: 0 12px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.dp-side-label .count {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #4a5670;
  font-weight: 500; letter-spacing: 0; margin-left: auto;
  padding: 2px 6px; background: #0d1322; border-radius: 4px;
}
.dp-side-item {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 12px; border-radius: 6px;
  font-size: 13px; color: #a4b0c6;
  cursor: pointer; transition: background .12s, color .12s;
}
.dp-side-item:hover { background: #111827; color: #e4ecf5; }
.dp-side-item.active { background: rgba(16,185,129,0.08); color: #ffffff; }
.dp-side-method {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 700;
  min-width: 40px; text-align: center;
  padding: 3px 0; border-radius: 3px;
  letter-spacing: 0.4px; opacity: 0.9;
}
.dp-side-method.get { color: #10b981; background: rgba(16,185,129,0.1); }
.dp-side-method.post { color: #3b82f6; background: rgba(59,130,246,0.1); }
.dp-side-method.put { color: #f59e0b; background: rgba(245,158,11,0.1); }
.dp-side-method.delete { color: #ef4444; background: rgba(239,68,68,0.1); }
.dp-side-item .path {
  flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.dp-main {
  padding: 52px 56px 96px;
  max-width: 1220px; min-width: 0;
}

/* Overview */
.dp-overview { margin-bottom: 72px; }
.dp-kicker {
  color: #10b981; font-size: 11.5px; font-weight: 600;
  letter-spacing: 2.2px; text-transform: uppercase;
}
.dp-title {
  font-size: 40px; font-weight: 700; color: #ffffff;
  margin-top: 14px; letter-spacing: -1.2px; line-height: 1.1;
}
.dp-lede {
  color: #93a3ba; margin-top: 18px; font-size: 15.5px;
  line-height: 1.65; max-width: 720px;
}
.dp-chip-row { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
.dp-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 999px;
  background: #0d1322; border: 1px solid #1a2238;
  font-size: 12px; color: #a4b0c6; font-weight: 500;
}
.dp-chip .ico { width: 12px; height: 12px; color: #6ee7b7; }

.dp-server {
  margin-top: 32px; padding: 14px 18px;
  background: #0a0f1f; border: 1px solid #141b2d; border-radius: 10px;
  display: flex; align-items: center; gap: 16px;
}
.dp-server .lbl {
  font-size: 10.5px; color: #6b7a95; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.3px;
  padding: 3px 8px; background: #0d1322; border: 1px solid #1a2238;
  border-radius: 4px;
}
.dp-server code {
  font-family: 'JetBrains Mono', monospace; font-size: 13.5px; color: #e4ecf5;
  flex: 1;
}
.dp-server .copy {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 6px;
  color: #6b7a95; font-size: 11.5px; font-weight: 500;
  transition: color .12s, background .12s;
}
.dp-server .copy:hover { color: #10b981; background: rgba(16,185,129,0.08); }
.dp-server .copy svg { width: 13px; height: 13px; }

/* Section */
.dp-section { margin-top: 84px; scroll-margin-top: 140px; }
.dp-section-hd {
  padding-bottom: 20px; border-bottom: 1px solid #141b2d;
  margin-bottom: 36px;
  display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap;
}
.dp-section-hd h2 {
  font-size: 28px; font-weight: 700; color: #ffffff; letter-spacing: -0.6px;
  display: inline-flex; align-items: center; gap: 12px;
}
.dp-tag-pill {
  font-size: 10.5px; color: #6ee7b7; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 4px;
  background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25);
}
.dp-section-hd .desc { color: #7e8ca5; font-size: 13.5px; flex: 1; min-width: 220px; }

/* Endpoint */
.dp-op {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
  gap: 40px; margin-bottom: 88px;
  scroll-margin-top: 140px;
}
.dp-op-hd {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  background: #0d1322; border: 1px solid #1a2238;
  border-radius: 10px;
  flex-wrap: wrap;
}
.dp-method {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.5px;
  padding: 6px 10px; border-radius: 5px; color: #fff;
  min-width: 60px; text-align: center;
}
.dp-method.get { background: #10b981; }
.dp-method.post { background: #3b82f6; }
.dp-method.put { background: #f59e0b; color: #1a1004; }
.dp-method.delete { background: #ef4444; }
.dp-op-path {
  font-family: 'JetBrains Mono', monospace; font-size: 14.5px;
  font-weight: 600; color: #e4ecf5; word-break: break-all; flex: 1;
}
.dp-op-path .param { color: #6ee7b7; }
.dp-op-auth {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: rgba(16,185,129,0.08);
  border: 1px solid rgba(16,185,129,0.25);
  color: #6ee7b7;
}
.dp-op-auth.none {
  background: rgba(239,68,68,0.08);
  border-color: rgba(239,68,68,0.3);
  color: #fca5a5;
}
.dp-op-auth svg { width: 11px; height: 11px; }

.dp-op-left, .dp-op-right { min-width: 0; }
.dp-op-summary {
  font-size: 22px; font-weight: 700; color: #ffffff;
  letter-spacing: -0.4px; margin-bottom: 10px;
}
.dp-op-desc {
  color: #93a3ba; font-size: 14.5px; line-height: 1.7; margin-bottom: 8px;
}

.dp-h {
  font-size: 10.5px; font-weight: 700; color: #6b7a95;
  text-transform: uppercase; letter-spacing: 1.3px;
  margin-top: 32px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.dp-h::after {
  content: ''; height: 1px; flex: 1; background: #141b2d;
}

.dp-param {
  padding: 14px 0; border-bottom: 1px solid #141b2d;
}
.dp-param:last-child { border-bottom: none; padding-bottom: 0; }
.dp-param-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.dp-param-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px; color: #ffffff; font-weight: 600;
}
.dp-param-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; color: #f59e0b;
}
.dp-param-in {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: #6b7a95; font-weight: 600;
  padding: 2px 7px; background: #0d1322;
  border: 1px solid #1a2238; border-radius: 4px;
  text-transform: lowercase;
}
.dp-param-req {
  font-size: 10px; color: #ef4444; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 2px 7px; background: rgba(239,68,68,0.1); border-radius: 4px;
}
.dp-param-opt {
  font-size: 10px; color: #6b7a95; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.dp-param-desc {
  color: #93a3ba; font-size: 13.5px; line-height: 1.6; margin-top: 8px;
}
.dp-param-ex {
  display: inline-flex; align-items: center; gap: 8px; margin-top: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
}
.dp-param-ex .lbl { color: #6b7a95; font-weight: 600; }
.dp-param-ex .val {
  color: #6ee7b7; padding: 3px 8px;
  background: #07091a; border: 1px solid #141b2d; border-radius: 4px;
}

/* Right column code */
.dp-code-block {
  background: #050814; border: 1px solid #141b2d;
  border-radius: 10px; overflow: hidden;
  margin-bottom: 16px;
  position: sticky; top: calc(var(--nav-height) + 76px);
}
.dp-code-block.nonsticky { position: static; }
.dp-code-tabs {
  display: flex; align-items: center;
  background: #0a0f1c; border-bottom: 1px solid #141b2d;
  padding: 0 4px 0 12px;
  height: 38px;
}
.dp-code-tabs .lbl {
  font-size: 10.5px; color: #6b7a95; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.3px; margin-right: 14px;
}
.dp-code-tab {
  padding: 0 11px; height: 38px; font-size: 12px; font-weight: 600;
  color: #6b7a95; cursor: pointer;
  border-bottom: 2px solid transparent;
  display: inline-flex; align-items: center;
  transition: color .12s;
}
.dp-code-tab:hover { color: #e4ecf5; }
.dp-code-tab.active { color: #10b981; border-bottom-color: #10b981; }
.dp-code-copy {
  margin-left: auto; padding: 6px 10px; color: #6b7a95; font-size: 11px;
  border-radius: 6px; display: inline-flex; align-items: center; gap: 5px;
  transition: background .12s, color .12s;
}
.dp-code-copy:hover { color: #10b981; background: rgba(16,185,129,0.08); }
.dp-code-copy svg { width: 12px; height: 12px; }

.dp-code-body {
  padding: 18px 20px; overflow-x: auto; background: #050814;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px; line-height: 1.75; color: #d9e4ef;
  white-space: pre;
  max-height: 480px; overflow-y: auto;
}
.dp-code-body.resp { background: #0a0d1a; }
.dp-code-body .c { color: #6b7a95; font-style: italic; }
.dp-code-body .s { color: #6ee7b7; }
.dp-code-body .n { color: #f59e0b; }
.dp-code-body .k { color: #60a5fa; font-weight: 600; }
.dp-code-body .v { color: #6ee7b7; }
.dp-code-body .p { color: #c792ea; }
.dp-code-body .q { color: #93a3ba; }

.dp-resp-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; font-weight: 700;
  padding: 3px 9px; border-radius: 4px;
}
.dp-resp-badge.ok { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.25); }
.dp-resp-badge.err { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.dp-resp-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.dp-resp-list { margin-top: 14px; }
.dp-resp-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #141b2d;
  font-size: 13px; color: #93a3ba;
}
.dp-resp-item:last-child { border-bottom: none; }
.dp-resp-item code {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: #60a5fa; padding: 2px 7px; background: #0a0f1f;
  border: 1px solid #1a2238; border-radius: 4px;
}

/* Schema table (used inline and in models) */
.dp-schema {
  margin-top: 4px;
  border: 1px solid #141b2d; border-radius: 8px; overflow: hidden;
  background: #0a0f1f;
}
.dp-schema .row {
  display: grid;
  grid-template-columns: minmax(140px, max-content) minmax(100px, max-content) 1fr;
  gap: 14px;
  padding: 12px 16px;
  border-bottom: 1px solid #141b2d;
  align-items: baseline;
}
.dp-schema .row:last-child { border-bottom: none; }
.dp-schema .n {
  font-family: 'JetBrains Mono', monospace;
  color: #ffffff; font-weight: 600; font-size: 13px;
}
.dp-schema .t {
  font-family: 'JetBrains Mono', monospace;
  color: #f59e0b; font-size: 11.5px; font-weight: 500;
}
.dp-schema .d { color: #93a3ba; font-size: 13px; line-height: 1.55; }

/* Recon panel (embedded in flow) */
.dp-recon {
  margin-top: 88px; padding: 40px 40px 36px;
  background:
    radial-gradient(600px 280px at 0% 0%, rgba(16,185,129,0.07), transparent 60%),
    linear-gradient(180deg, #0d1320 0%, #0a0e1c 100%);
  border: 1px solid #1e2639; border-radius: 14px;
  position: relative; overflow: hidden;
  grid-column: 1 / -1;
}
.dp-recon-hd {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 10px;
}
.dp-recon-hd .ico {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.25);
  color: #6ee7b7;
  display: flex; align-items: center; justify-content: center;
}
.dp-recon-hd .ico svg { width: 20px; height: 20px; }
.dp-recon-hd .sub {
  font-size: 11px; color: #10b981; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.8px;
  margin-bottom: 3px;
}
.dp-recon-hd h2 {
  font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px;
}
.dp-recon-hint {
  color: #93a3ba; font-size: 13.5px; line-height: 1.65;
  margin-top: 10px; max-width: 760px;
}

.dp-recon-form {
  display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
  margin-top: 28px;
}
.dp-rq { display: flex; flex-direction: column; gap: 8px; }
.dp-rq.full { grid-column: 1 / -1; }
.dp-rq label {
  font-size: 12.5px; font-weight: 600; color: #e4ecf5;
  display: flex; align-items: center; gap: 10px;
}
.dp-rq label .num {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(16,185,129,0.12);
  border: 1px solid rgba(16,185,129,0.3);
  color: #6ee7b7;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.dp-rq input {
  padding: 12px 16px;
  background: #07091a; border: 1px solid #1a2238;
  border-radius: 8px; color: #e4ecf5;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  transition: border-color .15s, box-shadow .15s;
}
.dp-rq input::placeholder { color: #4a5670; }
.dp-rq input:hover { border-color: #2a3446; }
.dp-rq input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }

.dp-recon-actions {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 14px; margin-top: 8px;
  flex-wrap: wrap;
}
.dp-run {
  padding: 12px 24px;
  background: #10b981; color: #05110b;
  font-weight: 700; font-size: 13px; letter-spacing: 0.2px;
  border-radius: 8px;
  display: inline-flex; align-items: center; gap: 8px;
  transition: background .15s, transform .1s;
}
.dp-run:hover { background: #34d399; }
.dp-run:active { transform: translateY(1px); }
.dp-run svg { width: 14px; height: 14px; }
.dp-recon-note {
  font-size: 12px; color: #6b7a95; font-family: 'JetBrains Mono', monospace;
}
.dp-result-slot { grid-column: 1 / -1; }

@media (max-width: 1100px) {
  .dp-op { grid-template-columns: 1fr; gap: 28px; }
  .dp-code-block { position: static; }
}
@media (max-width: 960px) {
  .dp-layout { grid-template-columns: 1fr; }
  .dp-sidebar { display: none; }
  .dp-main { padding: 36px 24px 64px; }
  .dp-recon { padding: 26px; }
  .dp-recon-form { grid-template-columns: 1fr; }
  .dp-title { font-size: 30px; }
}
@media (max-width: 680px) {
  .dp-subnav { padding: 0 16px; gap: 12px; }
  .dp-search { display: none; }
  .dp-section-hd h2 { font-size: 22px; }
  .dp-op-summary { font-size: 18px; }
  .dp-op-hd { padding: 10px 12px; }
  .dp-op-path { font-size: 13px; }
}

    if (qps.length) {

  function buildCurlExample(e) {
    const url = buildSampleUrl(e);
    const headers = [];
    if (e.auth.required && e.auth.type === 'BearerAuth') headers.push("Authorization: Bearer <TOKEN>");
    else if (e.auth.required && e.auth.type === 'ApiKeyAuth') headers.push("X-API-Key: <API_KEY>");
    headers.push("Accept: application/json");
    const bps = e.params.filter(p => p.in === 'body');

    let out = `<span class="k">curl</span> -X ${e.method} \\\n  <span class="s">'${escapeHtml(url)}'</span>`;
    headers.forEach(h => {

  function computePacketLength(p) {
    let total = 74;
    total += ('Host: ' + p.http.headers[0][1]).length + 2;
    p.http.headers.forEach(h => { total += (h[0] + ': ' + h[1]).length + 2; });
    total += p.http.request.length + 2;
    return total;
  }

    const frameLen = computePacketLength(p);
    const ethLen = frameLen - 14;
    const ipLen = ethLen - 20;
    const tcpLen = ipLen - 32;

    const hdrRows = p.http.headers.map(h => ({ k: h[0], v: h[1] }));
    const authIdx = hdrRows.findIndex(h => h.k === 'Authorization');

    const httpLines = [

          { label: `Destination Port: ${p.dport}`, leaf: true },
          { label: `Sequence Number: ${p.seq}`, leaf: true },
          { label: `Acknowledgment Number: ${p.ack}`, leaf: true },
          { label: `Flags: 0x018 (PSH, ACK)`, leaf: true },
          { label: `Window: 64240`, leaf: true }
        ]
      },
      {
        label: `Hypertext Transfer Protocol`,
        children: [
          {
            label: `<strong>${escapeHtml(p.http.request)}</strong>`,
            children: httpLines.map(l => ({ label: l, leaf: true }))
          },
          ...hdrRows.map((h, i) => {
            const special = i === authIdx;
            const label = special
              ? `<span style="background:rgba(245,158,11,0.2);color:#fbbf24;padding:1px 4px;border-radius:3px;">${escapeHtml(h.k)}: ${escapeHtml(h.v)}\\r\\n</span>`
              : `${escapeHtml(h.k)}: ${escapeHtml(h.v)}\\r\\n`;
            if (special && authDetail) {
              return { label: label, children: authDetail.map(x => ({ label: x, leaf: true })) };
            }
            return { label: label, leaf: true };
          }),
          { label: `\\r\\n`, leaf: true },
          { label: `[Full request URI: https://${p.http.headers[0][1]}${p.http.path}]`, leaf: true },
          { label: `[HTTP request 1/1]`, leaf: true }
        ]
      }
    ];

    document.getElementById('wrDetails').innerHTML = renderTree(tree, 0);

    app.querySelectorAll('#wrDetails .toggle').forEach(t => {
      t.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const children = t.parentElement.nextElementSibling;
        if (children && children.classList.contains('wr-children')) {
          children.classList.toggle('collapsed');
          t.textContent = children.classList.contains('collapsed') ? '\u25B8' : '\u25BE';
        }
      });
    });

    app.querySelectorAll('#wrList .wr-row').forEach(r => r.classList.toggle('selected', parseInt(r.dataset.pno,10) === wr_selected));
    document.getElementById('wrBytes').innerHTML = renderHex(buildRawBytes(p));
  }

  function decodeAuthAnnotation(v) {
    if (v.startsWith('Bearer ')) {
      const parts = v.substring(7).split('.');
      if (parts.length === 3) {
        return [
          `Authentication Scheme: Bearer (JWT)`,
          `JWT Header (base64url): ${escapeHtml(parts[0])}`,
          `JWT Payload (base64url): ${escapeHtml(parts[1])}`,
          `JWT Signature: ${escapeHtml(parts[2])}`,
          `[Note: payload is base64url-encoded and reversible without the signing secret]`
        ];
      }
    }
    if (v.startsWith('Basic ')) {
      return [
        `Authentication Scheme: Basic`,
        `Credentials (base64): ${escapeHtml(v.substring(6))}`,
        `[Note: Base64 is reversible, not encryption]`
      ];
    }
    return null;
  }

  function renderTree(nodes) {
    return nodes.map(n => {
      if (n.leaf || !n.children) {
        return `<div class="wr-node leaf"><span class="toggle"></span>${n.label}</div>`;
      }
      return `
        <div class="wr-node"><span class="toggle">&#9662;</span>${n.label}</div>
        <div class="wr-children">${renderTree(n.children)}</div>
      `;
    }).join('');
  }

  function buildRawBytes(p) {
    let s = p.http.request + '\r\n';
    p.http.headers.forEach(h => { s += h[0] + ': ' + h[1] + '\r\n'; });
    s += '\r\n';
    return s;
  }

  function renderHex(s) {
    const bytes = [];
    for (let i = 0; i < s.length; i++) bytes.push(s.charCodeAt(i) & 0xff);
    let out = '';
    for (let i = 0; i < bytes.length; i += 16) {
      const slice = bytes.slice(i, i + 16);
      const hex = slice.map(b => b.toString(16).padStart(2, '0')).join(' ');
      const padded = hex.padEnd(16 * 3 - 1, ' ');
      const ascii = slice.map(b => (b >= 32 && b < 127) ? String.fromCharCode(b) : '.').join('');
      const off = i.toString(16).padStart(4, '0');
      out += `<span class="off">${off}</span>   ${escapeHtml(padded)}   ${escapeHtml(ascii)}\n`;
    }
    return out;
  }

  function renderDrawerBody() {
    const body = document.getElementById('wrDrawerBody');
    if (wr_tab === 'jwt') {
      body.innerHTML = `
        <div class="wr-tool">
          <h4>JWT Decoder</h4>
          <div class="desc">Paste a JSON Web Token (three dot-separated base64url segments). The payload decodes without knowing the signing secret.</div>
          <textarea id="jwtIn" placeholder="eyJhbGciOi..." spellcheck="false"></textarea>
          <button id="jwtBtn" class="decode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Decode token
          </button>
          <div class="output-label">Decoded output</div>
          <div class="output empty" id="jwtOut">// awaiting input</div>
        </div>
      `;
      document.getElementById('jwtBtn').addEventListener('click', jwtDecode);
    } else if (wr_tab === 'b64') {
      body.innerHTML = `
        <div class="wr-tool">
          <h4>Base64 Decoder</h4>
          <div class="desc">Decodes a standard Base64-encoded string back to its UTF-8 plaintext. Works on credentials, binary blobs, and encoded payloads.</div>
          <textarea id="b64In" placeholder="d29ya2JyaWRnZV9h..." spellcheck="false"></textarea>
          <button id="b64Btn" class="decode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Decode
          </button>
          <div class="output-label">Decoded output</div>
          <div class="output empty" id="b64Out">// awaiting input</div>
        </div>
      `;
      document.getElementById('b64Btn').addEventListener('click', b64Decode);
    } else {
      body.innerHTML = `
        <div class="wr-quiz">
          <div class="wr-quiz-hd">
            <div class="icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            </div>
            <h3>Analyst Findings</h3>
          </div>
          <div class="sub">Submit findings from your packet analysis. All three must be correct — one wrong answer resets the form.</div>

          <div class="wr-q">
            <label><span class="num">1</span>Role of the user identified in the JWT Bearer token</label>
            <input id="r4q1" placeholder="role_value" autocomplete="off" spellcheck="false">
            <div class="tip">Hint: decode the JWT payload in frame #1.</div>
          </div>
          <div class="wr-q">
            <label><span class="num">2</span>Credentials exposed in the Basic Auth header</label>
            <input id="r4q2" placeholder="username:password" autocomplete="off" spellcheck="false">
            <div class="tip">Hint: Base64-decode the credential blob in frame #2.</div>
          </div>
          <div class="wr-q">
            <label><span class="num">3</span>API key leaked in the URL query string</label>
            <input id="r4q3" placeholder="key_value" autocomplete="off" spellcheck="false">
            <div class="tip">Hint: this credential is visible in frame #3 without decoding — that&rsquo;s the point.</div>
          </div>

          <button class="wr-submit" id="r4submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
            Submit report
          </button>
          <div id="r4result"></div>
        </div>
      `;
      document.getElementById('r4submit').addEventListener('click', () => {
        const v1 = document.getElementById('r4q1').value;
        const v2 = document.getElementById('r4q2').value;
        const v3 = document.getElementById('r4q3').value;
        const r = document.getElementById('r4result');
        if (!v1.trim() || !v2.trim() || !v3.trim()) {
          r.innerHTML = `<div class="wr-err">All three fields are required.</div>`;
          return;
        }
        const ok1 = norm(v1) === norm(d(K.q4.a[0]));
        const ok2 = v2.trim() === d(K.q4.a[1]);
        const ok3 = v3.trim() === d(K.q4.a[2]);
        if (ok1 && ok2 && ok3) {
          r.innerHTML = flagBlock(d(K.q4.f));
        } else {
          document.getElementById('r4q1').value = '';
          document.getElementById('r4q2').value = '';
          document.getElementById('r4q3').value = '';
          r.innerHTML = `<div class="wr-err">One or more findings are incorrect. All entries cleared &mdash; re-analyze the packets.</div>`;
        }
      });
    }
  }

  function b64Decode() {
    const v = document.getElementById('b64In').value.trim();
    const out = document.getElementById('b64Out');
    out.classList.remove('empty');
    if (!v) { out.innerHTML = '<span class="bad">// no input</span>'; return; }
    try {
      const decoded = atob(v);
      out.innerHTML = '<span class="ok">&#10003; Decoded</span>\n\n' + escapeHtml(decoded);
    } catch (e) {
      out.innerHTML = '<span class="bad">&#10007; Error: invalid base64</span>';
    }
  }

  function jwtDecode() {
    const v = document.getElementById('jwtIn').value.trim();
    const out = document.getElementById('jwtOut');
    out.classList.remove('empty');
    if (!v) { out.innerHTML = '<span class="bad">// no input</span>'; return; }
    const parts = v.split('.');
    if (parts.length !== 3) { out.innerHTML = '<span class="bad">&#10007; Error: JWT must have 3 segments</span>'; return; }
    try {
      const b64url = (s) => {
        let t = s.replace(/-/g, '+').replace(/_/g, '/');
        while (t.length % 4) t += '=';
        return atob(t);
      };
      const h = b64url(parts[0]);
      const p = b64url(parts[1]);
      let hfmt = h, pfmt = p;
      try { hfmt = JSON.stringify(JSON.parse(h), null, 2); } catch (e) {}
      try { pfmt = JSON.stringify(JSON.parse(p), null, 2); } catch (e) {}
      out.innerHTML =
        '<span class="ok">&#10003; Decoded</span>\n\n<span class="k">HEADER</span>\n' + colorJson(hfmt) +
        '\n\n<span class="k">PAYLOAD</span>\n' + colorJson(pfmt) +
        '\n\n<span class="k">SIGNATURE</span>\n<span class="v">' + escapeHtml(parts[2]) + '</span>';
    } catch (e) {
      out.innerHTML = '<span class="bad">&#10007; Error: unable to decode segments</span>';
    }
  }

  function colorJson(s) {
    return escapeHtml(s)
      .replace(/(&quot;[^&]*?&quot;)(\s*:)/g, '<span class="k">$1</span>$2')
      .replace(/:\s*(&quot;[^&]*?&quot;)/g, ': <span class="v">$1</span>')
      .replace(/:\s*(-?\d+(?:\.\d+)?)/g, ': <span class="v">$1</span>');
  }

  route();
})();
</script>
